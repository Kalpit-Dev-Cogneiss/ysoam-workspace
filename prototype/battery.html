<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/auth.js"></script>
  <title>Battery Management — YSOAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="fuel" data-subpage="battery">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-area">
      <div id="topbar-root"></div>
      <main class="content content--fuel-history content--battery">
        <div class="page-header page-header--compact fuel-history-header">
          <div class="page-header__text">
            <h1>Battery Management <a class="service-learn-link" href="roadmap.html">Learn</a></h1>
          </div>
          <div class="page-header__actions">
            <button type="button" class="btn btn-outline btn-sm fh-header-more" aria-label="More actions"><span data-lucide-icon="moreHorizontal"></span></button>
            <a class="btn btn-outline btn-sm" href="charging-history.html">Charging History</a>
          </div>
        </div>

        <div class="service-view-tabs battery-view-tabs" role="tablist" aria-label="Battery views">
          <button type="button" class="service-view-tab is-active" data-tab="all" role="tab" aria-selected="true">All</button>
          <button type="button" class="service-view-tab" data-tab="healthy" role="tab">Healthy</button>
          <button type="button" class="service-view-tab" data-tab="attention" role="tab">Attention</button>
          <button type="button" class="service-view-tab" data-tab="critical" role="tab">Critical</button>
        </div>

        <div class="panel table-panel fuel-history-panel battery-panel">
          <div class="fuel-history-toolbar">
            <div class="fuel-history-toolbar__left">
              <div class="table-panel__search">
                <span class="table-panel__search-icon" data-lucide-icon="search" aria-hidden="true"></span>
                <input type="search" class="table-panel__search-input" id="battery-search" placeholder="Search" aria-label="Search batteries">
              </div>
              <button type="button" class="expense-filter-pill" data-filter="vehicle" aria-expanded="false" aria-haspopup="dialog">Vehicle</button>
              <button type="button" class="expense-filter-pill" data-filter="status" aria-expanded="false" aria-haspopup="dialog">Status</button>
              <button type="button" class="expense-filters-btn" id="battery-filters-btn" aria-expanded="false" aria-controls="battery-filters-drawer">
                <span class="expense-filters-btn__icon" data-lucide-icon="filter" aria-hidden="true"></span>
                <span class="expense-filters-btn__label" id="battery-filters-btn-label">Filters</span>
              </button>
            </div>
            <div class="fuel-history-toolbar__right" id="battery-pagination">
              <span class="fh-pagination__count tabular-nums" id="battery-count">1 – 50 of 0</span>
              <button type="button" class="fh-page-btn" data-page-prev aria-label="Previous page"><span data-lucide-icon="chevronLeft"></span></button>
              <button type="button" class="fh-page-btn" data-page-next aria-label="Next page"><span data-lucide-icon="chevronRight"></span></button>
              <button type="button" class="fh-page-btn" id="battery-table-settings-btn" aria-label="Table settings"><span data-lucide-icon="settings"></span></button>
            </div>
          </div>

          <div class="fuel-history-stats" id="battery-stats"></div>

          <div class="fuel-history-body">
            <div class="panel__body panel__body--flush fuel-history-table-wrap">
              <div class="data-table-wrap data-table-wrap--scroll data-table-wrap--battery" id="battery-table"></div>
            </div>
            <aside class="expense-filters-drawer" id="battery-filters-drawer" aria-label="Filters">
              <div class="expense-filters-drawer__header">
                <h2>Filters</h2>
                <button type="button" class="expense-filters-drawer__close" id="battery-filters-drawer-close" aria-label="Close filters"><span data-lucide-icon="x" data-lucide-icon-size="18"></span></button>
              </div>
              <div class="expense-filters-drawer__body" id="battery-filters-drawer-body"></div>
            </aside>
          </div>

          <div class="expense-filter-popover" id="battery-filter-popover" hidden role="dialog" aria-modal="true"></div>
          <div class="expense-table-settings" id="battery-table-settings" hidden role="dialog" aria-label="Table settings"></div>
        </div>
      </main>
    </div>
  </div>
  <div id="bottom-nav-root"></div>
  <script src="js/icons.js"></script>
  <script src="js/lucide-icons.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/vehicles-data.js"></script>
  <script src="js/battery-data.js"></script>
  <script src="js/battery.js"></script>
</body>
</html>
