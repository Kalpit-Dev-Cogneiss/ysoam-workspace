<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicles — YSOAM Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="vehicles" data-subpage="vehicle-list">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-area">
      <div id="topbar-root"></div>
      <main class="content content--vehicles">
        <div class="page-header page-header--compact">
          <div class="page-header__text">
            <h1>Vehicles</h1>
          </div>
          <div class="page-header__actions">
            <a class="btn btn-outline btn-sm" href="gps.html">Live Map</a>
            <a class="btn btn-primary btn-sm" href="vehicle-form">Add Vehicle</a>
          </div>
        </div>

        <div class="vehicles-body">
          <div class="segment-tabs" role="tablist" aria-label="Vehicle views">
            <button type="button" class="segment-tab is-active" data-vehicle-tab="all" role="tab">All</button>
            <button type="button" class="segment-tab" data-vehicle-tab="assigned" role="tab">Assigned</button>
            <button type="button" class="segment-tab" data-vehicle-tab="unassigned" role="tab">Unassigned</button>
            <button type="button" class="segment-tab" data-vehicle-tab="archived" role="tab">Archived</button>
          </div>

          <div class="panel table-panel vehicles-panel">
          <div class="vehicles-panel__toolbar">
            <div class="vehicles-panel__search">
              <span class="vehicles-panel__search-icon" aria-hidden="true">⌕</span>
              <input type="search" class="vehicles-panel__search-input" id="vehicles-search" placeholder="Search vehicles…" aria-label="Search vehicles">
            </div>
            <select class="vehicles-panel__filter" id="filter-type" aria-label="Vehicle type">
              <option value="">All types</option>
              <option value="Truck">Truck</option>
              <option value="Van">Van</option>
            </select>
            <select class="vehicles-panel__filter" id="filter-group" aria-label="Vehicle group">
              <option value="">All groups</option>
              <option value="Expressway">Expressway</option>
              <option value="Pune Depot">Pune Depot</option>
              <option value="Mumbai Port">Mumbai Port</option>
            </select>
            <select class="vehicles-panel__filter" id="filter-status" aria-label="Vehicle status">
              <option value="">All statuses</option>
              <option value="active">Active</option>
              <option value="transit">In Transit</option>
              <option value="idle">Idle</option>
              <option value="offline">Offline</option>
              <option value="maintenance">Maintenance</option>
            </select>
            <span class="vehicles-panel__count tabular-nums" id="vehicles-count">10 vehicles</span>
          </div>
          <div class="panel__body panel__body--flush">
            <div class="data-table-wrap data-table-wrap--vehicles">
              <table class="data-table data-table--list data-table--vehicles">
                <thead>
                  <tr>
                    <th class="data-table__check-col"><input type="checkbox" aria-label="Select all"></th>
                    <th>Name</th>
                    <th>Year</th>
                    <th>Make</th>
                    <th>Model</th>
                    <th>VIN</th>
                    <th>Status</th>
                    <th>Type</th>
                    <th>Group</th>
                    <th>Current Meter</th>
                    <th>License Plate</th>
                    <th>Watchers</th>
                    <th class="data-table__actions-col"></th>
                  </tr>
                </thead>
                <tbody id="vehicles-table-body"></tbody>
              </table>
            </div>
          </div>
        </div>
        </div>
      </main>
    </div>
  </div>
  <div id="bottom-nav-root"></div>
  <script src="js/icons.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/fleet-data.js"></script>
  <script src="js/vehicles-data.js"></script>
  <script src="js/vehicles.js"></script>
</body>
</html>
