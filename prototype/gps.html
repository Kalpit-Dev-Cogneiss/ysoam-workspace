<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking — YSOAM Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="gps" class="live-tracking-page">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-area live-tracking-main">
      <div class="live-tracking-wrap" data-map-root>
        <div class="live-map-frame">
          <button type="button" class="live-map-menu-btn" id="sidebar-toggle" aria-label="Toggle menu">☰</button>
          <div class="map-mode-toggle map-mode-toggle--float">
            <button type="button" class="map-mode-btn is-active" data-map-mode="satellite">Satellite</button>
            <button type="button" class="map-mode-btn" data-map-mode="street">Street</button>
          </div>
          <div id="map-gps" class="live-map"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/icons.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/nav.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/fleet-data.js"></script>
  <script src="js/vehicle-icons.js"></script>
  <script src="js/fleet-map.js"></script>
</body>
</html>
