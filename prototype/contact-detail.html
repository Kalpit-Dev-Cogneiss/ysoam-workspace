<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="js/auth.js"></script>
  <title>Driver — YSOAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="drivers" data-subpage="contact-detail">
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-area">
      <div id="topbar-root"></div>
      <main class="content content--vehicle-detail">
        <a class="vd-back" href="drivers"><span data-form-icon="arrowLeft"></span> Drivers</a>
        <div class="vd-sheet">
          <header class="vd-hero" id="cd-hero"></header>
          <nav class="vd-tabs" id="cd-tabs" role="tablist" aria-label="Driver sections"></nav>
          <div class="vd-body cd-body">
            <div id="cd-panel" role="tabpanel"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div id="bottom-nav-root"></div>

  <div class="modal-overlay" id="cd-assignment-modal" role="dialog" aria-labelledby="cd-assignment-title" aria-modal="true">
    <div class="modal modal--assignment">
      <div class="modal__header">
        <h2 class="modal__title" id="cd-assignment-title">Add Vehicle Assignment</h2>
        <button type="button" class="modal__close" id="cd-assignment-close" aria-label="Close">×</button>
      </div>
      <form class="modal__body assign-form" id="cd-assignment-form">
        <div class="form-field">
          <label class="form-label" for="cd-assign-vehicle-trigger">Assigned Vehicle <span class="form-required">*</span></label>
          <div class="assign-picker" id="cd-assign-vehicle-picker">
            <button type="button" class="assign-picker__trigger" id="cd-assign-vehicle-trigger" aria-haspopup="listbox" aria-expanded="false">
              <span class="assign-picker__placeholder">Please select</span>
              <span class="assign-picker__chevron" aria-hidden="true">▾</span>
            </button>
            <div class="assign-picker__menu assign-picker__menu--searchable" id="cd-assign-vehicle-menu" role="listbox" hidden>
              <div class="assign-picker__menu-search">
                <input type="search" class="text-input" id="cd-assign-vehicle-search" placeholder="Search vehicles" aria-label="Search vehicles">
              </div>
              <div class="assign-picker__menu-list" id="cd-assign-vehicle-list"></div>
            </div>
          </div>
          <input type="hidden" id="cd-assign-vehicle-id" name="vehicleId">
        </div>

        <div class="form-field">
          <label class="form-label" for="cd-assign-operator-display">Operator <span class="form-required">*</span></label>
          <div class="assign-picker assign-picker--readonly" id="cd-assign-operator-picker">
            <div class="assign-picker__trigger assign-picker__trigger--readonly" id="cd-assign-operator-display" tabindex="-1">
              <span class="assign-picker__placeholder">—</span>
            </div>
          </div>
        </div>

        <div class="form-field">
          <span class="form-label">Start Date/Time</span>
          <div class="assign-datetime-row">
            <input type="date" class="text-input" name="startDate" id="cd-assign-start-date">
            <input type="time" class="text-input" name="startTime" id="cd-assign-start-time">
          </div>
          <p class="form-hint">When assignment starts. Leave blank if assignment has always existed.</p>
        </div>

        <div class="form-field">
          <span class="form-label">End Date/Time</span>
          <div class="assign-datetime-row">
            <input type="date" class="text-input" name="endDate" id="cd-assign-end-date">
            <input type="time" class="text-input" name="endTime" id="cd-assign-end-time">
          </div>
          <p class="form-hint">When does this assignment end? Can be past or future.</p>
        </div>

        <div class="form-field">
          <label class="form-label" for="cd-assign-comment">Comment</label>
          <textarea class="text-input assign-comment" name="comment" id="cd-assign-comment" rows="4" placeholder="Add an optional comment"></textarea>
        </div>
      </form>
      <div class="modal__footer">
        <button type="button" class="btn btn-text" id="cd-assignment-cancel">Cancel</button>
        <button type="submit" form="cd-assignment-form" class="btn btn-primary" id="cd-assignment-save" disabled>Save Assignment</button>
      </div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/fleet-data.js"></script>
  <script src="js/vehicles-data.js"></script>
  <script src="js/drivers-data.js"></script>
  <script src="js/contact-detail.js"></script>
</body>
</html>
